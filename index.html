<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            text-align: center;
        }
        #gameCanvas {
            border: 3px solid #0f0;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            background: radial-gradient(circle, #001100 0%, #000050 50%, #000000 100%);
        }
        #ui {
            color: #0f0;
            margin-top: 10px;
            font-size: 18px;
            text-shadow: 0 0 10px #0f0;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #0f0;
            border-radius: 10px;
        }
        #gameOverScreen {
            display: none;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0f0;
        }
        .btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover {
            background: #0a0;
            box-shadow: 0 0 15px #0f0;
        }
        h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #f00;
            text-shadow: 0 0 15px #f00;
        }
        .instructions {
            color: #0f0;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.8;
        }
        .key {
            background: #0f0;
            color: #000;
            padding: 2px 8px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            Score: <span id="score">0</span> | 
            Level: <span id="level">1</span> | 
            Ships: <span id="lives">3</span> | 
            High Score: <span id="highScore">0</span>
        </div>
        <div id="startScreen">
            <h1>ASTEROIDS</h1>
            <button class="btn" onclick="startGame()">START GAME</button>
            <div class="instructions">
                <span class="key">←</span> <span class="key">→</span> Rotate<br>
                <span class="key">↑</span> Thrust<br>
                <span class="key">SPACE</span> Fire Laser<br>
                <span class="key">P</span> Pause
            </div>
            <p style="margin-top: 20px; font-size: 12px;">Classic space shooter - Destroy all asteroids!</p>
        </div>
        <div id="gameOverScreen">
            <h1 id="gameOverTitle">GAME OVER</h1>
            <p style="font-size: 24px;">Score: <span id="finalScore">0</span></p>
            <p id="highScoreText" style="font-size: 14px; color: gold;"></p>
            <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>
    <script src="asteroids.js"></script>
</body>
</html>
